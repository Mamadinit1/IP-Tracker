<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check Ip</title>
    <link rel="stylesheet" href="styles/app.css" />
  </head>
  <body>
    <section class="hero">
      <div class="hero-content">
        <span class="badge">🌍 IP TRACKER</span>

        <h1>Discover Location Information From Any IP Address</h1>

        <p>
          Enter an IP address and instantly retrieve location details and
          geographical information.
        </p>
      </div>

      <div class="previewCard">
        <div class="previewTop">
          <div class="cardHeader">Live Result</div>
          <button class="searchBtn">🌍 TRACK IP</button>
        </div>

        <div class="infoBox">
          <span>📍 City</span>
          <strong>Tehran</strong>
        </div>

        <div class="infoBox">
          <span>🌎 Country</span>
          <strong>Iran</strong>
        </div>

        <div class="infoBox">
          <span>🗺️ Continent</span>
          <strong>Asia</strong>
        </div>

        <div class="infoBox">
          <span>🔗 IP</span>
          <strong>185.126.xxx.xxx</strong>
        </div>
      </div>
    </section>
    <script src="script/app.js"></script>
  </body>
</html>
